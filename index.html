<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💙</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#6ec6ff,#2193b0);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: background 1.5s ease;
}

/* ⭐ ESTRELLAS PRO */
.star{
  position:absolute;
  background:white;
  border-radius:50%;
  animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
  from{opacity:0.2}
  to{opacity:1}
}

/* 🌙 LUNA */
.moon{
  position:absolute;
  top:20%;
  right:10%;
  width:110px;
  height:110px;
  background:white;
  border-radius:50%;
  opacity:0;
  box-shadow:0 0 70px rgba(255,255,255,0.9);
  transition:opacity 2s, transform 3s ease;
}

/* TARJETA */
.card{
  position:relative;
  z-index:2;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  padding:30px;
  width:90%;
  max-width:420px;
  text-align:center;
}

/* ✉️ SOBRE 3D */
.envelope{
  position:relative;
  width:100%;
  height:160px;
  background:linear-gradient(135deg,#e0f2ff,#b3e5fc);
  border-radius:12px;
  overflow:hidden;
  margin-top:15px;
  box-shadow:0 12px 25px rgba(0,0,0,0.3);
  perspective:1000px;
  cursor:pointer;
}

/* tapa */
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#90caf9,#64b5f6);
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transform: rotateX(0deg);
  transition: transform 0.8s ease;
  z-index:3;
  box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.envelope.open .flap{
  transform: rotateX(120deg);
}

/* carta */
.letter{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:linear-gradient(180deg,#ffffff,#f5f5f5);
  color:#333;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px;
  transform:translateY(100%);
  transition: transform 0.7s ease;
  box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
}

.envelope.open .letter{
  transform: translateY(0);
}

/* TEXTO */
#mensaje{
  font-size:1.2em;
  text-align:center;
  opacity:0;
  transition:opacity 0.5s ease;
}

/* BOTONES */
.btn{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:white;
  color:#0077b6;
  cursor:pointer;
}

/* 🧸 PELUCHES */
.peluche{
  position:absolute;
  filter: drop-shadow(0 15px 20px rgba(0,0,0,0.4));
  animation:float ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0.8);opacity:0}
  10%{opacity:1}
  50%{transform:translateY(40vh) scale(1)}
  100%{transform:translateY(-10vh) scale(1.1);opacity:0}
}

</style>
</head>

<body>

<div class="moon" id="moon"></div>

<div class="card">
  <h1>Hola Aslhisiita :)</h1>

  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <p id="mensaje"></p>
    </div>
  </div>

  <button class="btn" onclick="toggleMusic()">🎵 Música</button>
</div>

<audio id="music" src="all-i-want.mp3"></audio>
<audio id="paperSound" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>

const mensajes = [
  "Quería hacerte algo especial 💙",
  "Eres una gran chica",
  "Se nota que te esfuerzas mucho",
  "Tienes algo que te hace diferente",
  "Y me gusta seguir conociéndote :)",
  "FINAL"
];

let index = 0;
let writing = false;

/* CARTA */
function abrirCarta(texto){
  const env = document.getElementById("envelope");
  const msg = document.getElementById("mensaje");

  env.classList.remove("open");
  msg.style.opacity = 0;

  setTimeout(()=>{
    env.classList.add("open");

    // sonido papel
    const sound = document.getElementById("paperSound");
    sound.currentTime = 0;
    sound.play();

    // vibración
    if(navigator.vibrate){
      navigator.vibrate(40);
    }

    setTimeout(()=>{
      escribirTexto(texto);
      msg.style.opacity = 1;
    },400);

  },300);
}

/* TEXTO */
function escribirTexto(texto){
  const el=document.getElementById('mensaje');
  el.innerHTML="";
  let i=0;
  writing=true;

  const intervalo=setInterval(()=>{
    el.innerHTML+=texto[i];
    i++;
    if(i>=texto.length){
      clearInterval(intervalo);
      writing=false;
    }
  },30);
}

/* SIGUIENTE */
function siguienteMensaje(){
  if(writing)return;

  index++;
  cambiarFondo();

  if(index>=mensajes.length-1){
    abrirCarta("ojalá te haya gustado este pequeño detalle :) me pareces increíble 💙");
    clearInterval(pelucheInterval);
    return;
  }

  abrirCarta(mensajes[index]);
}

/* CLICK EN CARTA */
document.getElementById("envelope").addEventListener("click", siguienteMensaje);

/* FONDOS */
function cambiarFondo(){

  if(index==1)
    document.body.style.background="linear-gradient(180deg,#6ec6ff,#4facfe)";

  if(index==2)
    document.body.style.background="linear-gradient(180deg,#4facfe,#1e3c72)";

  if(index==3)
    document.body.style.background="linear-gradient(180deg,#1e3c72,#3a6186)";

  if(index==4){
    document.body.style.background="linear-gradient(180deg,#3a6186,#89216b)";
    moon.style.opacity=0.7;
  }

  if(index>=5){
    document.body.style.background="linear-gradient(180deg,#0f2027,#000000)";
    moon.style.opacity=1;
  }
}

/* MUSICA */
function toggleMusic(){
  const audio=document.getElementById('music');
  if(audio.paused){
    audio.volume=0.25;
    audio.play();
  }else{
    audio.pause();
  }
}

/* ⭐ ESTRELLAS */
for(let i=0;i<110;i++){
  const star=document.createElement('div');
  star.className='star';

  const size = Math.random()*2 + 1;

  star.style.width=size+'px';
  star.style.height=size+'px';
  star.style.top=Math.random()*100+'%';
  star.style.left=Math.random()*100+'%';
  star.style.opacity=Math.random();

  document.body.appendChild(star);
}

/* 🧸 PELUCHES */
const peluches=[
  'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG142.png',
  'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG97.png',
  'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG47.png'
];

function crearPeluche(){
  const p=document.createElement('img');
  p.src=peluches[Math.floor(Math.random()*peluches.length)];
  p.className='peluche';
  p.style.left=Math.random()*100+'vw';
  p.style.width=(120+Math.random()*80)+'px';
  p.style.animationDuration=(10+Math.random()*6)+'s';

  document.body.appendChild(p);
  setTimeout(()=>p.remove(),14000);
}

const pelucheInterval = setInterval(crearPeluche,2500);

/* INICIO */
abrirCarta(mensajes[0]);

</script>

</body>
</html>
