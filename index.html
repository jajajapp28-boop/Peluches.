<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#6ec6ff,#2193b0);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 1.5s ease;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

.moon{
  position:absolute;
  top:15%;
  right:10%;
  width:140px;
  height:140px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #fff 40%, #ddd 70%, #bbb);
  box-shadow:0 0 80px white, 0 0 150px rgba(255,255,255,0.5);
  opacity:0;
  transition:opacity 2s;
}

.card{
  position:relative;
  z-index:2;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  padding:25px;
  width:90%;
  max-width:400px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

.envelope{
  margin-top:15px;
  position:relative;
  height:150px;
  background:linear-gradient(135deg,#e3f2fd,#bbdefb);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#90caf9,#42a5f5);
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:0.8s cubic-bezier(.4,2,.6,1);
  z-index:2;
}

.envelope.open .flap{
  transform:rotateX(120deg);
}

.letter{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:white;
  color:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px;
  transform:translateY(100%);
  transition:0.6s;
}

.envelope.open .letter{
  transform:translateY(-10px);
}

#mensaje{
  font-family:'Caveat',cursive;
  font-size:1.5em;
  line-height:1.4;
  opacity:0;
  transition:0.5s;
}

.btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:white;
  color:#0077b6;
}

.peluche{
  position:absolute;
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
  animation:float linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-10vh);opacity:0}
}

.shooting-star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  box-shadow:0 0 10px white, 0 0 20px white;
  border-radius:50%;
  pointer-events:none;
  z-index:1;
}

.shooting-star::after{
  content:'';
  position:absolute;
  width:120px;
  height:2px;
  background:linear-gradient(to right, white, transparent);
  transform:rotate(45deg);
  transform-origin:left;
}
</style>
</head>

<body>

<canvas id="space"></canvas>
<div class="moon" id="moon"></div>

<div class="card">
  <h2>Hola Aslhisiita :)</h2>

  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <p id="mensaje"></p>
    </div>
  </div>

  <button class="btn" onclick="toggleMusic()">🎵 Música</button>
</div>

<audio id="music" src="all-i-want.mp3"></audio>

<script>

const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let stars = [];

for(let i=0;i<180;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    speed:Math.random()*0.3,
    alpha:Math.random()
  });
}

let glowEffect = null;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  let intensidad = index >= 4 ? 1 : 0.6;

  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.alpha * intensidad})`;
    ctx.fill();

    s.y -= s.speed;
    if(s.y < 0){
      s.y = canvas.height;
      s.x = Math.random()*canvas.width;
    }
  });

  if(glowEffect){
    const g = glowEffect;
    const grad = ctx.createRadialGradient(g.x,g.y,0,g.x,g.y,g.r);
    grad.addColorStop(0,"rgba(255,255,255,0.25)");
    grad.addColorStop(1,"transparent");
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  requestAnimationFrame(draw);
}
draw();

/* 🌠 ESTRELLA REAL */
function crearEstrellaFugaz(){
  const star = document.createElement("div");
  star.className = "shooting-star";

  const startX = Math.random() * window.innerWidth;
  const startY = Math.random() * window.innerHeight * 0.3;

  star.style.left = startX + "px";
  star.style.top = startY + "px";

  document.body.appendChild(star);

  const distancia = 500 + Math.random()*300;
  const duracion = 900 + Math.random()*600;

  let startTime = null;

  function animar(time){
    if(!startTime) startTime = time;
    const progress = (time - startTime)/duracion;

    glowEffect = {
      x: startX + distancia*progress,
      y: startY + distancia*progress,
      r: 120*(1-progress)
    };

    if(progress < 1){
      requestAnimationFrame(animar);
    }else{
      glowEffect = null;
    }
  }

  requestAnimationFrame(animar);

  star.animate([
    { transform:'translate(0,0)', opacity:1 },
    { transform:`translate(${distancia}px,${distancia}px)`, opacity:0 }
  ],{
    duration:duracion,
    easing:'ease-out'
  });

  setTimeout(()=>star.remove(),duracion);
}

setInterval(()=>{
  if(Math.random()>0.6){
    crearEstrellaFugaz();
  }
},2000);

/* TEXTO */
function escribir(texto){
  let i=0;
  mensaje.innerHTML="";
  const inter=setInterval(()=>{
    mensaje.innerHTML += texto.charAt(i);
    i++;
    if(i>=texto.length) clearInterval(inter);
  },40);
}

const mensajes=[
"Quería hacerte algo especial 💙",
"Eres una gran chica",
"Se nota que te esfuerzas mucho",
"Tienes algo diferente",
"Me gusta hablar contigo",
"FINAL"
];

let index=0;

function fondo(){
  if(index==1)
    document.body.style.background="linear-gradient(#6ec6ff,#4facfe)";
  if(index==2)
    document.body.style.background="linear-gradient(#4facfe,#1e3c72)";
  if(index==3)
    document.body.style.background="linear-gradient(#1e3c72,#2c3e50)";
  if(index==4)
    document.body.style.background="linear-gradient(#2c3e50,#000)";
  if(index>=5){
    document.body.style.background="#000";
    moon.style.opacity=1;
  }
}

function abrir(t){
  envelope.classList.remove("open");
  mensaje.style.opacity=0;

  setTimeout(()=>{
    envelope.classList.add("open");
    escribir(t);
    mensaje.style.opacity=1;
  },300);
}

envelope.onclick=()=>{
  index++;
  fondo();

  if(index>=mensajes.length-1){
    abrir("ojalá te haya gustado :) me pareces increíble 💙");
    return;
  }

  abrir(mensajes[index]);
};

/* PELUCHES */
const peluches=[
'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG142.png',
'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG97.png',
'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG47.png'
];

setInterval(()=>{
  const p=document.createElement("img");
  p.src=peluches[Math.floor(Math.random()*peluches.length)];
  p.className="peluche";
  p.style.left=Math.random()*100+"vw";
  p.style.width=(130+Math.random()*70)+"px";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),14000);
},2000);

/* MÚSICA */
function toggleMusic(){
  music.paused?music.play():music.pause();
}

abrir(mensajes[0]);

</script>
</body>
</html>
