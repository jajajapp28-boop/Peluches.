<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💙</title><style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#4facfe,#1e3c72);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: background 1s ease;
}

.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  box-shadow:0 0 8px white;
  animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
  from{opacity:0.3}
  to{opacity:1}
}

.card{
  position:relative;
  z-index:2;
  backdrop-filter:blur(18px);
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  padding:30px;
  width:90%;
  max-width:420px;
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  text-align:center;
  animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(0.95)}
  to{opacity:1;transform:scale(1)}
}

#mensaje{
  margin-top:15px;
  font-size:1.2em;
  min-height:80px;
}

.btn{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:white;
  color:#0077b6;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{ transform:scale(1.08); }

.btn.secondary{
  background:transparent;
  border:1px solid rgba(255,255,255,0.4);
  color:white;
}

.peluche{
  position:absolute;
  width:150px;
  filter: drop-shadow(0 15px 20px rgba(0,0,0,0.4));
  animation:float 12s ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0.8);opacity:0}
  10%{opacity:1}
  50%{transform:translateY(40vh) scale(1)}
  100%{transform:translateY(-10vh) scale(1.1);opacity:0}
}

</style></head><body><div class="card">
  <h1>Hola Aslhisiita :)</h1>
  <p id="mensaje"></p><button class="btn" id="musicBtn" onclick="toggleMusic()">🎵 Reproducir</button> <button class="btn secondary" onclick="siguienteMensaje()">Siguiente</button>

</div><audio id="music" src="all-i-want.mp3"></audio>

<script>

const mensajes = [
  "Quería hacerte algo especial 💙",
  "Eres una gran chica",
  "Se nota que te esfuerzas mucho",
  "Tienes algo que se nota diferente",
  "Y me gusta seguir conociéndote :)",
  "FINAL"
];

let index=0;
let writing=false;

function escribirTexto(texto){
  const el=document.getElementById('mensaje');
  el.innerHTML="";
  let i=0;
  writing=true;

  const intervalo=setInterval(()=>{
    el.innerHTML+=texto[i];
    i++;
    if(i>=texto.length){
      clearInterval(intervalo);
      writing=false;
    }
  },30);
}

function siguienteMensaje(){
  if(writing)return;
  index++;

  // Cambio de fondo dinámico
  if(index==1) document.body.style.background="linear-gradient(180deg,#4facfe,#1e3c72)";
  if(index==2) document.body.style.background="linear-gradient(180deg,#1e3c72,#2a5298)";
  if(index==3) document.body.style.background="linear-gradient(180deg,#2a5298,#4facfe)";
  if(index==4) document.body.style.background="linear-gradient(180deg,#1e3c72,#6a11cb)";

  // MENSAJE FINAL
  if(index>=mensajes.length-1){
    escribirTexto("ojalá te haya gustado este pequeño detalle sencillo :) me pareces increíble 💙");

    // detener peluches
    clearInterval(pelucheInterval);
    return;
  }

  escribirTexto(mensajes[index]);
}

function toggleMusic(){
  const audio=document.getElementById('music');
  const btn=document.getElementById('musicBtn');

  if(audio.paused){
    audio.volume=0.25;
    audio.play();
    btn.textContent="⏸️ Pausar";
  }else{
    audio.pause();
    btn.textContent="🎵 Reproducir";
  }
}

// ESTRELLAS
for(let i=0;i<180;i++){
  const star=document.createElement('div');
  star.className='star';
  star.style.top=Math.random()*100+'%';
  star.style.left=Math.random()*100+'%';
  document.body.appendChild(star);
}

// PELUCHES (MEJORES LINKS)
const peluches=[
  'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG142.png',
  'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG97.png',
  'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG47.png'
];

function crearPeluche(){
  const p=document.createElement('img');
  p.src=peluches[Math.floor(Math.random()*peluches.length)];
  p.className='peluche';
  p.style.left=Math.random()*100+'vw';
  document.body.appendChild(p);

  setTimeout(()=>p.remove(),14000);
}

const pelucheInterval = setInterval(crearPeluche,1500);

escribirTexto(mensajes[0]);

</script></body>
</html>
