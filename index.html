<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💙</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#6ec6ff,#2193b0);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: background 1.5s ease;
}

/* ESTRELLAS */
.star{
  position:absolute;
  width:3px;
  height:3px;
  background:white;
  border-radius:50%;
  opacity:0.2;
  animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
  from{opacity:0.2}
  to{opacity:1}
}

/* LUNA */
.moon{
  position:absolute;
  top:20%;
  right:10%;
  width:100px;
  height:100px;
  background:white;
  border-radius:50%;
  opacity:0;
  box-shadow:0 0 60px rgba(255,255,255,0.9);
  transition:opacity 2s, transform 3s ease;
}

/* TARJETA */
.card{
  position:relative;
  z-index:2;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  padding:30px;
  width:90%;
  max-width:420px;
  text-align:center;
}

/* SOBRE REAL */
.envelope{
  position:relative;
  width:100%;
  height:140px;
  background:#ffffff20;
  border-radius:10px;
  overflow:hidden;
  margin-top:15px;
}

/* tapa */
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.3);
  clip-path: polygon(0 0, 100% 0, 50% 50%);
  transform-origin: top;
  transition: transform 0.6s ease;
  z-index:2;
}

/* carta */
.letter{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  transform:translateY(100%);
  transition: transform 0.6s ease;
}

/* apertura */
.envelope.open .flap{
  transform: rotateX(180deg);
}

.envelope.open .letter{
  transform: translateY(0);
}

/* TEXTO */
#mensaje{
  font-size:1.2em;
  text-align:center;
  opacity:0;
  transition:opacity 0.5s ease;
  text-shadow:0 0 8px rgba(255,255,255,0.4);
}

/* BRILLO */
.brillo{
  animation:glow 2s ease-in-out infinite alternate;
}

@keyframes glow{
  from{ text-shadow:0 0 6px rgba(255,255,255,0.3); }
  to{ text-shadow:0 0 14px rgba(255,255,255,0.8); }
}

/* LATIDO */
.latido{
  animation:pulse 1.8s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{ transform:scale(1); }
  50%{ transform:scale(1.05); }
}

/* BOTONES */
.btn{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:white;
  color:#0077b6;
  cursor:pointer;
}

.btn.secondary{
  background:transparent;
  border:1px solid rgba(255,255,255,0.4);
  color:white;
}

/* PELUCHES */
.peluche{
  position:absolute;
  filter: drop-shadow(0 15px 20px rgba(0,0,0,0.4));
  animation:float ease-in-out infinite;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0.8);opacity:0}
  10%{opacity:1}
  50%{transform:translateY(40vh) scale(1)}
  100%{transform:translateY(-10vh) scale(1.1);opacity:0}
}

</style>
</head>

<body>

<div class="moon" id="moon"></div>

<div class="card">
  <h1>Hola Aslhisiita :)</h1>

  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <p id="mensaje"></p>
    </div>
  </div>

  <button class="btn" onclick="toggleMusic()">🎵 Música</button>
  <button class="btn secondary" onclick="siguienteMensaje()">Siguiente</button>
</div>

<audio id="music" src="all-i-want.mp3"></audio>

<script>

const mensajes = [
  "Quería hacerte algo especial 💙",
  "Eres una gran chica",
  "Se nota que te esfuerzas mucho",
  "Tienes algo que se nota diferente",
  "Y me gusta seguir conociéndote :)",
  "FINAL"
];

let index = 0;
let writing = false;

/* CARTA */
function abrirCarta(texto){
  const env = document.getElementById("envelope");
  const msg = document.getElementById("mensaje");

  env.classList.remove("open");
  msg.style.opacity = 0;
  msg.classList.remove("latido","brillo");

  setTimeout(()=>{
    env.classList.add("open");

    setTimeout(()=>{
      escribirTexto(texto);
      msg.style.opacity = 1;

      if(index === 0 || index >= mensajes.length-1){
        msg.classList.add("latido","brillo");
      } else {
        msg.classList.add("brillo");
      }

    },300);

  },200);
}

/* TEXTO */
function escribirTexto(texto){
  const el=document.getElementById('mensaje');
  el.innerHTML="";
  let i=0;
  writing=true;

  const intervalo=setInterval(()=>{
    el.innerHTML+=texto[i];
    i++;
    if(i>=texto.length){
      clearInterval(intervalo);
      writing=false;
    }
  },30);
}

/* SIGUIENTE */
function siguienteMensaje(){
  if(writing)return;

  index++;

  cambiarFondo();

  if(index>=mensajes.length-1){
    abrirCarta("ojalá te haya gustado este pequeño detalle :) me pareces increíble 💙");
    clearInterval(pelucheInterval);
    return;
  }

  abrirCarta(mensajes[index]);
}

/* FONDOS SUAVES */
function cambiarFondo(){

  if(index==1)
    document.body.style.background="linear-gradient(180deg,#6ec6ff,#4facfe)";

  if(index==2)
    document.body.style.background="linear-gradient(180deg,#4facfe,#1e3c72)";

  if(index==3)
    document.body.style.background="linear-gradient(180deg,#1e3c72,#3a6186)";

  if(index==4){
    document.body.style.background="linear-gradient(180deg,#3a6186,#89216b)";
    document.getElementById("moon").style.opacity=0.7;
    document.getElementById("moon").style.transform="translateY(-20px)";
  }

  if(index>=5){
    document.body.style.background="linear-gradient(180deg,#0f2027,#000000)";
    document.getElementById("moon").style.opacity=1;
  }

  document.querySelectorAll('.star').forEach(s=>{
    s.style.opacity = 0.2 + (index * 0.15);
  });
}

/* MUSICA */
function toggleMusic(){
  const audio=document.getElementById('music');
  if(audio.paused){
    audio.volume=0.25;
    audio.play();
  }else{
    audio.pause();
  }
}

/* ESTRELLAS */
for(let i=0;i<150;i++){
  const star=document.createElement('div');
  star.className='star';
  star.style.top=Math.random()*100+'%';
  star.style.left=Math.random()*100+'%';
  document.body.appendChild(star);
}

/* PELUCHES */
const peluches=[
  'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG142.png',
  'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG97.png',
  'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG47.png'
];

function crearPeluche(){
  const p=document.createElement('img');
  p.src=peluches[Math.floor(Math.random()*peluches.length)];
  p.className='peluche';
  p.style.left=Math.random()*100+'vw';
  p.style.width=(120+Math.random()*80)+'px';
  p.style.transform=`rotate(${Math.random()*20-10}deg)`;
  p.style.animationDuration=(10+Math.random()*6)+'s';
  p.style.opacity=0.85;

  document.body.appendChild(p);
  setTimeout(()=>p.remove(),14000);
}

const pelucheInterval = setInterval(crearPeluche,2000);

/* INICIO */
abrirCarta(mensajes[0]);

</script>

</body>
</html>
