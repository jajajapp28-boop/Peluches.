<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💙</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#6ec6ff,#2193b0);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 1.5s ease;
}

/* 🌌 CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* 🌙 LUNA */
.moon{
  position:absolute;
  top:15%;
  right:10%;
  width:90px;
  height:90px;
  background:white;
  border-radius:50%;
  opacity:0;
  box-shadow:0 0 60px white;
  transition:opacity 2s;
}

/* CARD */
.card{
  position:relative;
  z-index:2;
  backdrop-filter:blur(12px);
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  padding:25px;
  width:90%;
  max-width:380px;
  text-align:center;
}

/* ✉️ SOBRE */
.envelope{
  margin-top:15px;
  position:relative;
  height:140px;
  background:#bbdefb;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

/* TAPA */
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:#90caf9;
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:0.7s;
  z-index:2;
}

.envelope.open .flap{
  transform:rotateX(120deg);
}

/* CARTA */
.letter{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:white;
  color:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
  transform:translateY(100%);
  transition:0.6s;
}

.envelope.open .letter{
  transform:translateY(0);
}

/* TEXTO */
#mensaje{
  opacity:0;
  transition:0.5s;
}

/* BOTÓN */
.btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:white;
  color:#0077b6;
}

/* ✨ CURSOR */
.cursor-glow{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  background:white;
  opacity:0.8;
  pointer-events:none;
  animation:fade 0.6s forwards;
}

@keyframes fade{
  to{transform:scale(3);opacity:0}
}

</style>
</head>

<body>

<canvas id="space"></canvas>
<div class="moon" id="moon"></div>

<div class="card">
  <h2>Hola Aslhisiita :)</h2>

  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <p id="mensaje"></p>
    </div>
  </div>

  <button class="btn" onclick="toggleMusic()">🎵 Música</button>
</div>

<audio id="music" src="all-i-want.mp3"></audio>

<script>

/* 🌌 GALAXIA */
const c=document.getElementById("space");
const ctx=c.getContext("2d");
c.width=innerWidth;
c.height=innerHeight;

let stars=[];
for(let i=0;i<100;i++){
  stars.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*1.5
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();

/* MENSAJES */
const mensajes=[
"Quería hacerte algo especial 💙",
"Eres una gran chica",
"Se nota que te esfuerzas mucho",
"Tienes algo diferente",
"Me gusta hablar contigo",
"FINAL"
];

let index=0;

/* TEXTO */
function escribir(t){
  let i=0;
  mensaje.innerHTML="";
  const int=setInterval(()=>{
    mensaje.innerHTML+=t[i];
    i++;
    if(i>=t.length) clearInterval(int);
  },35);
}

/* CAMBIO DE FONDO */
function fondo(){
  if(index==1) document.body.style.background="linear-gradient(#6ec6ff,#4facfe)";
  if(index==2) document.body.style.background="linear-gradient(#4facfe,#1e3c72)";
  if(index==3) document.body.style.background="linear-gradient(#1e3c72,#2c3e50)";
  if(index==4){
    document.body.style.background="linear-gradient(#2c3e50,#000)";
    moon.style.opacity=1;
  }
}

/* CARTA */
function abrir(t){
  envelope.classList.remove("open");
  mensaje.style.opacity=0;

  setTimeout(()=>{
    envelope.classList.add("open");
    escribir(t);
    mensaje.style.opacity=1;
  },300);
}

envelope.onclick=()=>{
  index++;
  fondo();

  if(index>=mensajes.length-1){
    abrir("ojalá te haya gustado :) me pareces increíble 💙");
    return;
  }

  abrir(mensajes[index]);
};

/* MUSICA */
function toggleMusic(){
  music.paused?music.play():music.pause();
}

/* CURSOR */
document.addEventListener("mousemove",e=>{
  const g=document.createElement("div");
  g.className="cursor-glow";
  g.style.left=e.clientX+"px";
  g.style.top=e.clientY+"px";
  document.body.appendChild(g);
  setTimeout(()=>g.remove(),600);
});

/* INICIO */
abrir(mensajes[0]);

</script>
</body>
</html>
