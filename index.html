<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💙</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#6ec6ff,#2193b0);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 🌌 CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* 🌙 LUNA */
.moon{
  position:absolute;
  top:20%;
  right:10%;
  width:110px;
  height:110px;
  background:white;
  border-radius:50%;
  opacity:0;
  box-shadow:
    0 0 80px rgba(255,255,255,1),
    0 0 120px rgba(255,255,255,0.6);
  transition:opacity 2s, transform 1s;
}

/* 🎬 TRANSICIÓN CINEMÁTICA */
.fade{
  animation:fadeZoom 0.6s ease;
}

@keyframes fadeZoom{
  from{opacity:0; transform:scale(0.95);}
  to{opacity:1; transform:scale(1);}
}

/* TARJETA */
.card{
  position:relative;
  z-index:2;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  padding:30px;
  width:90%;
  max-width:420px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.5);
}

/* ✉️ SOBRE */
.envelope{
  position:relative;
  width:100%;
  height:160px;
  background:linear-gradient(135deg,#e0f2ff,#b3e5fc);
  border-radius:12px;
  margin-top:15px;
  perspective:1000px;
  cursor:pointer;
  transition:transform 0.4s;
}

.envelope.open{
  transform: scale(1.05);
}

/* FLAP */
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#90caf9,#42a5f5);
  clip-path: polygon(0 0, 100% 0, 50% 65%);
  transform-origin: top;
  transition: transform 0.9s cubic-bezier(.4,2,.6,1);
  z-index:3;
  box-shadow:0 15px 25px rgba(0,0,0,0.5);
}

.envelope.open .flap{
  transform: rotateX(120deg);
}

/* 📜 CARTA POP-OUT */
.letter{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:
    linear-gradient(180deg,#ffffff,#f1f1f1),
    repeating-linear-gradient(0deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 1px, transparent 1px, transparent 24px);
  color:#333;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px;
  transform:translateY(100%) scale(0.9);
  transition: transform 0.7s ease;
  box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.envelope.open .letter{
  transform: translateY(-20px) scale(1.05);
}

/* TEXTO */
#mensaje{
  font-size:1.2em;
  opacity:0;
  transition:0.5s;
}

/* BOTÓN */
.btn{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:white;
  color:#0077b6;
  cursor:pointer;
}

/* ✨ PARTÍCULAS */
.particle{
  position:absolute;
  width:6px;
  height:6px;
  border-radius:50%;
  pointer-events:none;
  animation:explode 1s forwards;
}

@keyframes explode{
  to{
    transform:translate(var(--x), var(--y)) scale(2);
    opacity:0;
  }
}

/* ✨ CURSOR GLOW */
.cursor-glow{
  position:fixed;
  width:8px;
  height:8px;
  border-radius:50%;
  pointer-events:none;
  background:radial-gradient(circle, white, transparent);
  animation:fadeOut 0.6s forwards;
}

@keyframes fadeOut{
  to{transform:scale(3); opacity:0;}
}

/* 🧸 PELUCHES */
.peluche{
  position:absolute;
  animation:float linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-10vh);opacity:0}
}

</style>
</head>

<body>

<canvas id="space"></canvas>
<div class="moon" id="moon"></div>

<div class="card" id="card">
  <h1>Hola Aslhisiita :)</h1>

  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <p id="mensaje"></p>
    </div>
  </div>

  <button class="btn" onclick="toggleMusic()">🎵 Música</button>
</div>

<audio id="music" src="all-i-want.mp3"></audio>
<audio id="paperSound" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<script>

/* 🌌 GALAXIA */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let stars = Array.from({length:120},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()*1.5,
  s:Math.random()*0.3
}));

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
    s.y-=s.s;
    if(s.y<0){s.y=canvas.height; s.x=Math.random()*canvas.width;}
  });
  requestAnimationFrame(draw);
}
draw();

/* ✍️ TEXTO */
function escribir(t){
  let i=0;
  const el=document.getElementById("mensaje");
  el.innerHTML="";
  const int=setInterval(()=>{
    el.innerHTML+=t[i];
    i++;
    if(i>=t.length) clearInterval(int);
  },35);
}

/* ✨ PARTÍCULAS */
function explosion(x,y){
  for(let i=0;i<12;i++){
    const p=document.createElement("div");
    p.className="particle";
    p.style.left=x+"px";
    p.style.top=y+"px";
    const ang=Math.random()*2*Math.PI;
    const dist=Math.random()*120;
    p.style.setProperty("--x",Math.cos(ang)*dist+"px");
    p.style.setProperty("--y",Math.sin(ang)*dist+"px");
    p.style.background="radial-gradient(circle,white,transparent)";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1000);
  }
}

/* ✉️ CARTA */
const mensajes=[
"Quería hacerte algo especial 💙",
"Eres una gran chica",
"Se nota que te esfuerzas mucho",
"Tienes algo que te hace diferente",
"Y me gusta seguir conociéndote :)",
"FINAL"
];

let index=0;

function abrirCarta(t){
  const env=envelope;
  const msg=mensaje;
  const card=document.getElementById("card");

  card.classList.remove("fade");

  env.classList.remove("open");
  msg.style.opacity=0;

  setTimeout(()=>{
    env.classList.add("open");

    document.getElementById("paperSound").play();
    if(navigator.vibrate) navigator.vibrate(40);

    const r=env.getBoundingClientRect();
    explosion(r.left+r.width/2, r.top);

    setTimeout(()=>{
      card.classList.add("fade");
      escribir(t);
      msg.style.opacity=1;
    },400);

  },300);
}

/* CLICK */
envelope.onclick=()=>{
  index++;
  if(index>=mensajes.length-1){
    abrirCarta("ojalá te haya gustado este pequeño detalle :) me pareces increíble 💙");
    return;
  }
  abrirCarta(mensajes[index]);
};

/* 🎵 */
function toggleMusic(){
  const a=music;
  a.paused?a.play():a.pause();
}

/* ✨ CURSOR */
let last=0;
function glow(x,y){
  const now=Date.now();
  if(now-last<30)return;
  last=now;
  const g=document.createElement("div");
  g.className="cursor-glow";
  g.style.left=x+"px";
  g.style.top=y+"px";
  document.body.appendChild(g);
  setTimeout(()=>g.remove(),600);
}

document.addEventListener("mousemove",e=>glow(e.clientX,e.clientY));
document.addEventListener("touchmove",e=>{
  const t=e.touches[0];
  glow(t.clientX,t.clientY);
});

/* 🧸 */
const peluches=[
'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG142.png',
'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG97.png'
];

setInterval(()=>{
  const p=document.createElement("img");
  p.src=peluches[Math.floor(Math.random()*peluches.length)];
  p.className="peluche";
  p.style.left=Math.random()*100+"vw";
  p.style.width=(120+Math.random()*80)+"px";
  p.style.animationDuration=(10+Math.random()*5)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),14000);
},2500);

/* START */
abrirCarta(mensajes[0]);

</script>
</body>
</html>
