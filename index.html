<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💙</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#6ec6ff,#2193b0);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  transition:background 1.5s ease, opacity 1.5s;
}

body.loaded{
  opacity:1;
}

/* 🌌 CANVAS */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* 🌙 LUNA REALISTA */
.moon{
  position:absolute;
  top:12%;
  right:8%;
  width:160px;
  height:160px;
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, #fff 30%, #ddd 55%, #aaa 80%),
    radial-gradient(circle at 65% 65%, rgba(0,0,0,0.25) 10%, transparent 12%),
    radial-gradient(circle at 40% 75%, rgba(0,0,0,0.2) 8%, transparent 10%),
    radial-gradient(circle at 75% 35%, rgba(0,0,0,0.18) 6%, transparent 8%);
  box-shadow:
    0 0 60px rgba(255,255,255,0.9),
    0 0 120px rgba(255,255,255,0.4),
    inset -10px -10px 20px rgba(0,0,0,0.2);
  opacity:0;
  transform:scale(0.8);
  transition:opacity 2s, transform 2s;
}

/* 💎 TARJETA PREMIUM */
.card{
  position:relative;
  z-index:2;
  backdrop-filter:blur(30px);
  background:rgba(255,255,255,0.06);
  border-radius:25px;
  padding:28px;
  width:90%;
  max-width:400px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.25);
  box-shadow:
    0 25px 70px rgba(0,0,0,0.7),
    inset 0 0 25px rgba(255,255,255,0.05);
  transform:scale(0.8);
  opacity:0;
  filter:blur(10px);
  transition:all 1.2s ease;
}

body.loaded .card{
  transform:scale(1);
  opacity:1;
  filter:blur(0);
}

/* ✨ BORDE ILUMINADO */
.card::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:25px;
  padding:1px;
  background:linear-gradient(120deg, rgba(255,255,255,0.5), transparent, rgba(255,255,255,0.4));
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity:0.6;
}

/* ✨ BRILLO */
.card::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:25px;
  background:radial-gradient(circle at 20% 20%, rgba(255,255,255,0.25), transparent 60%);
  opacity:0.4;
}

/* 💓 LATIDO */
@keyframes latido{
  0%{transform:scale(1)}
  30%{transform:scale(1.02)}
  50%{transform:scale(1)}
  70%{transform:scale(1.02)}
  100%{transform:scale(1)}
}
.latido{
  animation:latido 1.8s infinite;
}

/* ✉️ SOBRE */
.envelope{
  margin-top:15px;
  height:150px;
  background:linear-gradient(135deg,#e3f2fd,#bbdefb);
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  transition:transform 0.3s;
  position:relative;
  overflow:hidden;
}
.envelope:hover{transform:scale(1.03)}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#90caf9,#42a5f5);
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:0.8s;
}
.envelope.open .flap{transform:rotateX(120deg)}

.letter{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:white;
  color:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px;
  transform:translateY(100%);
  transition:0.6s;
}
.envelope.open .letter{transform:translateY(-10px)}

/* ✍️ TEXTO */
#mensaje{
  font-family:'Caveat',cursive;
  font-size:1.7em;
  text-shadow:0 2px 10px rgba(0,0,0,0.3);
  opacity:0;
}

/* 🧸 PELUCHES */
.peluche{
  position:absolute;
  animation:float linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh);opacity:0}
  10%{opacity:1}
  100%{transform:translateY(-10vh);opacity:0}
}
</style>
</head>

<body>

<canvas id="space"></canvas>
<div class="moon" id="moon"></div>

<div class="card">
  <h2>Hola Aslhisiita :)</h2>

  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <p id="mensaje"></p>
    </div>
  </div>
</div>

<script>

/* 🌌 ESTRELLAS */
const canvas=document.getElementById("space");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let stars=[];
for(let i=0;i<180;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    speed:Math.random()*0.3,
    alpha:Math.random()
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  stars.forEach(s=>{
    s.alpha+=(Math.random()-0.5)*0.08;
    if(s.alpha<0.2)s.alpha=0.2;
    if(s.alpha>1)s.alpha=1;

    s.r+=(Math.random()-0.5)*0.1;
    if(s.r<0.5)s.r=0.5;
    if(s.r>2.5)s.r=2.5;

    ctx.beginPath();
    ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${s.alpha})`;
    ctx.fill();

    s.y-=s.speed;
    if(s.y<0){
      s.y=canvas.height;
      s.x=Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* TEXTO */
function escribir(texto){
  let i=0;
  mensaje.innerHTML="";
  const inter=setInterval(()=>{
    mensaje.innerHTML+=texto.charAt(i);
    if(++i>=texto.length)clearInterval(inter);
  },40);
}

const mensajes=[
"Quería hacerte algo especial 💙",
"Eres una gran chica",
"Se nota que te esfuerzas mucho",
"Tienes algo diferente",
"Me gusta hablar contigo",
"Casi termino...",
"FINAL"
];

let index=0;

function fondo(){
  if(index==4){
    document.body.style.background="linear-gradient(#3a6186,#000)";
    moon.style.opacity=1;
    moon.style.transform="scale(1)";
  }
  if(index==5){
    document.body.style.background="linear-gradient(#000,#000)";
  }
}

function abrir(t){
  envelope.classList.remove("open");
  mensaje.style.opacity=0;

  setTimeout(()=>{
    envelope.classList.add("open");
    escribir(t);
    mensaje.style.opacity=1;
  },300);
}

envelope.onclick=()=>{
  index++;
  fondo();

  if(index>=mensajes.length-1){
    abrir("ojalá te haya gustado :) me pareces increíble 💙");
    return;
  }

  abrir(mensajes[index]);
};

/* PELUCHES */
setInterval(()=>{
  const p=document.createElement("img");
  p.src='https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG142.png';
  p.className="peluche";
  p.style.left=Math.random()*100+"vw";
  p.style.width=(130+Math.random()*70)+"px";
  p.style.animationDuration=(10+Math.random()*6)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),14000);
},2000);

/* INICIO */
window.onload=()=>{
  setTimeout(()=>{
    document.body.classList.add("loaded");

    setTimeout(()=>{
      document.querySelector(".card").classList.add("latido");
      abrir(mensajes[0]);
    },1200);

  },300);
};
</script>

</body>
</html>
