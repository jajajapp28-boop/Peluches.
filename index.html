<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💙</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  height:100vh;
  overflow:hidden;
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(180deg,#6ec6ff,#2193b0);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background 1.5s ease;
}

/* 🌌 GALAXIA */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:0;
}

/* 🌙 LUNA */
.moon{
  position:absolute;
  top:15%;
  right:10%;
  width:120px;
  height:120px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #fff, #ddd);
  opacity:0;
  box-shadow:0 0 80px white, 0 0 140px rgba(255,255,255,0.5);
  transition:opacity 2s;
}

/* CARD */
.card{
  position:relative;
  z-index:2;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.15);
  border-radius:20px;
  padding:25px;
  width:90%;
  max-width:400px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* ✉️ SOBRE */
.envelope{
  margin-top:15px;
  position:relative;
  height:150px;
  background:linear-gradient(135deg,#e3f2fd,#bbdefb);
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#90caf9,#42a5f5);
  clip-path:polygon(0 0,100% 0,50% 60%);
  transform-origin:top;
  transition:0.8s cubic-bezier(.4,2,.6,1);
  z-index:2;
}

.envelope.open .flap{
  transform:rotateX(120deg);
}

.letter{
  position:absolute;
  bottom:0;
  width:100%;
  height:100%;
  background:
    linear-gradient(#fff,#f1f1f1),
    repeating-linear-gradient(transparent,transparent 22px,rgba(0,0,0,0.05) 23px);
  color:#333;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px;
  transform:translateY(100%);
  transition:0.6s;
}

.envelope.open .letter{
  transform:translateY(-10px);
}

/* ✍️ TEXTO */
#mensaje{
  font-size:1.2em;
  opacity:0;
  transition:0.5s;
}

/* BOTÓN */
.btn{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:white;
  color:#0077b6;
}

/* ✨ CURSOR */
.cursor-glow{
  position:fixed;
  width:6px;
  height:6px;
  border-radius:50%;
  background:white;
  pointer-events:none;
  animation:fade 0.6s forwards;
}

@keyframes fade{
  to{transform:scale(3);opacity:0}
}

/* 🧸 PELUCHES */
.peluche{
  position:absolute;
  filter: drop-shadow(0 10px 15px rgba(0,0,0,0.4));
  animation:float linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh) scale(0.8);opacity:0}
  10%{opacity:1}
  50%{transform:translateY(40vh) scale(1)}
  100%{transform:translateY(-10vh) scale(1.1);opacity:0}
}

</style>
</head>

<body>

<canvas id="space"></canvas>
<div class="moon" id="moon"></div>

<div class="card">
  <h2>Hola Aslhisiita :)</h2>

  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="letter">
      <p id="mensaje"></p>
    </div>
  </div>

  <button class="btn" onclick="toggleMusic()">🎵 Música</button>
</div>

<audio id="music" src="all-i-want.mp3"></audio>

<script>

/* 🌌 GALAXIA REAL */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

let stars = [];

for(let i=0;i<140;i++){
  stars.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    s:Math.random()*0.4
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  stars.forEach(star=>{
    ctx.beginPath();
    ctx.arc(star.x,star.y,star.r,0,Math.PI*2);
    ctx.fillStyle="rgba(255,255,255,0.8)";
    ctx.fill();

    star.y -= star.s;

    if(star.y < 0){
      star.y = canvas.height;
      star.x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(draw);
}

draw();

/* ✍️ ESCRITURA REAL */
function escribir(texto){
  let i=0;
  mensaje.innerHTML="";
  const inter=setInterval(()=>{
    mensaje.innerHTML+=texto[i];
    i++;

    if(texto[i]==" ") i++;

    if(i>=texto.length) clearInterval(inter);
  },45);
}

/* MENSAJES */
const mensajes=[
"Quería hacerte algo especial 💙",
"Eres una gran chica",
"Se nota que te esfuerzas mucho",
"Tienes algo diferente",
"Me gusta hablar contigo",
"FINAL"
];

let index=0;

/* 🌈 FONDOS */
function fondo(){
  if(index==1) document.body.style.background="linear-gradient(#6ec6ff,#4facfe)";
  if(index==2) document.body.style.background="linear-gradient(#4facfe,#1e3c72)";
  if(index==3) document.body.style.background="linear-gradient(#1e3c72,#3a6186)";
  if(index==4){
    document.body.style.background="linear-gradient(#3a6186,#000)";
    moon.style.opacity=1;
  }
}

/* ✉️ CARTA */
function abrir(t){
  envelope.classList.remove("open");
  mensaje.style.opacity=0;

  setTimeout(()=>{
    envelope.classList.add("open");
    escribir(t);
    mensaje.style.opacity=1;
  },300);
}

envelope.onclick=()=>{
  index++;
  fondo();

  if(index>=mensajes.length-1){
    abrir("ojalá te haya gustado :) me pareces increíble 💙");
    return;
  }

  abrir(mensajes[index]);
};

/* 🧸 PELUCHES */
const peluches=[
'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG142.png',
'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG97.png',
'https://pngimg.com/uploads/teddy_bear/teddy_bear_PNG47.png'
];

setInterval(()=>{
  const p=document.createElement("img");
  p.src=peluches[Math.floor(Math.random()*peluches.length)];
  p.className="peluche";
  p.style.left=Math.random()*100+"vw";
  p.style.width=(130+Math.random()*70)+"px";
  p.style.animationDuration=(10+Math.random()*6)+"s";
  document.body.appendChild(p);
  setTimeout(()=>p.remove(),14000);
},2000);

/* ✨ CURSOR */
document.addEventListener("mousemove",e=>{
  const g=document.createElement("div");
  g.className="cursor-glow";
  g.style.left=e.clientX+"px";
  g.style.top=e.clientY+"px";
  document.body.appendChild(g);
  setTimeout(()=>g.remove(),600);
});

/* 🎵 */
function toggleMusic(){
  music.paused?music.play():music.pause();
}

/* INICIO */
abrir(mensajes[0]);

</script>
</body>
</html>
